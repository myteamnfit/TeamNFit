<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team-N-Fit | Paquete Premium</title>
    <style>
        :root {
            --rosa: #ff00ff;
            --blanco: #ffffff;
            --negro: #000000;
            --gris-oscuro: #0a0a0a;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            scroll-behavior: smooth;
        }

        /* Navegación */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 5%;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: var(--rosa); }

        /* Hero - Tu Imagen Principal */
        .hero-container {
            margin-top: 60px;
            width: 100%;
            background-color: var(--negro);
            border-bottom: 2px solid var(--rosa);
        }

        .hero-container img {
            width: 100%;
            max-width: 1100px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Sección Única de Paquete */
        section { padding: 80px 10%; text-align: center; }

        .premium-box {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 20px;
            max-width: 600px;
            margin: 0 auto;
            background: radial-gradient(circle, #111 0%, #000 100%);
            border-radius: 20px;
        }

        h2 { font-size: 2.2rem; font-weight: 200; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        .fecha { color: var(--rosa); font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; }

        /* PRECIO GRANDE Y BLANCO */
        .precio-premium {
            font-size: 5.5rem; /* Tamaño grande */
            font-weight: bold;
            color: var(--blanco);
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .precio-premium span { font-size: 1.5rem; vertical-align: top; margin-right: 5px; }
        .per-person { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        /* Botón de Pago */
        .btn-pago {
            background: var(--rosa);
            color: var(--negro);
            padding: 20px 50px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            margin-top: 40px;
            font-size: 1rem;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-pago:hover { background: var(--blanco); box-shadow: 0 0 30px var(--blanco); }

        /* Contacto */
        #ubicacion { background: #050505; border-top: 1px solid #111; }
        .map-container {
            width: 100%;
            max-width: 800px;
            margin: 30px auto;
            filter: grayscale(1) invert(0.9);
            opacity: 0.6;
        }

        footer { padding: 40px; color: #333; font-size: 0.7rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TEAM-N-<span>FIT</span></div>
        <a href="#ubicacion" style="color:white; text-decoration:none; font-size:0.7rem; text-transform:uppercase;">Ubicación</a>
    </nav>

    <div class="hero-container">
        <img src="portada.jpg.png" alt="Team-N-Fit Portada Oficial">
    </div>

    <!-- PAQUETE ÚNICO PREMIUM -->
    <section>
        <div class="premium-box">
            <h2>PAQUETE PREMIUM</h2>
            <div class="fecha">Sábado 20 de Junio</div>
            
            <p style="font-weight: 200; opacity: 0.8;">Únete a la experiencia exclusiva de Zumba y Fitness</p>
            
            <div class="precio-premium"><span>$</span>39,99</div>
            <div class="per-person">Por persona</div>

            <a href="pago.html" class="btn-pago">RESERVAR MI LUGAR</a>
        </div>
    </section>

    <!-- CONTACTO Y MAPA -->
    <section id="ubicacion">
        <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">
            📍 1020 S Olympia Pl, Kennewick, WA 99337<br>
            📞 509-845-4218 / 509-845-4230<br>
            📧 MyTeamNfit@gmail.com
        </p>

        <div class="map-container">
            <iframe src="https://google.com" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <footer>
        &copy; 2024 TEAM-N-FIT | Kennewick, Washington.
    </footer>

</body>
</html>
