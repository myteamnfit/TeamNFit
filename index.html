<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team-N-Fit | Zumba Premium Kennewick</title>
    <style>
        :root {
            --rosa: #ff00ff;
            --blanco: #ffffff;
            --negro: #000000;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* BARRA DE NAVEGACIÓN */
        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 20px 5%;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--rosa);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }
        .logo span { color: var(--rosa); }
        nav div a { color: var(--blanco); text-decoration: none; margin-left: 25px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* PORTADA - TU IMAGEN DEL RAYO */
        .hero-section {
            margin-top: 80px;
            width: 100%;
            background-color: var(--negro);
            display: flex;
            justify-content: center;
            border-bottom: 5px solid var(--rosa);
        }

        .hero-section img {
            width: 100%;
            max-width: 1200px;
            height: auto;
            display: block;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
        }

        /* SECCIÓN PAQUETE PREMIUM */
        section { padding: 100px 10%; text-align: center; }
        
        .premium-container {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 30px;
            max-width: 650px;
            margin: 0 auto;
            background: #050505;
            border-radius: 25px;
        }

        h2 { font-size: 2.2rem; font-weight: 200; letter-spacing: 6px; text-transform: uppercase; }
        .evento-fecha { color: var(--rosa); font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 40px; font-weight: bold; }

        /* PRECIO GRANDE */
        .precio-display {
            font-size: 6rem;
            font-weight: 900;
            color: var(--blanco);
            margin: 30px 0;
        }
        .precio-display span { font-size: 2rem; vertical-align: top; color: var(--rosa); }

        /* BOTONES */
        .btn-reserva {
            background: var(--rosa);
            color: var(--negro);
            padding: 22px 60px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 60px;
            display: inline-block;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn-mapa {
            background: transparent;
            color: var(--blanco);
            border: 1px solid var(--blanco);
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            margin-top: 30px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-mapa:hover { background: var(--blanco); color: var(--negro); }

        /* CONTACTO */
        #ubicacion { background: #050505; border-top: 1px solid #1a1a1a; padding-bottom: 80px; }
        .contact-details { font-size: 1rem; margin-bottom: 30px; line-height: 2.5; color: var(--blanco); font-weight: 300; }
        .contact-details b { color: var(--rosa); }

        footer { padding: 50px; color: #333; font-size: 0.75rem; text-transform: uppercase; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TEAM-N-<span>FIT</span></div>
        <div><a href="#inicio">Inicio</a><a href="#ubicacion">Ubicación</a></div>
    </nav>

    <div class="hero-section" id="inicio">
        <img src="portada.jpg.png" alt="Team-N-Fit Portada Oficial">
    </div>

    <!-- SECCIÓN PREMIUM -->
    <section>
        <div class="premium-container">
            <h2>PAQUETE PREMIUM</h2>
            <div class="evento-fecha">Sábado 20 de Junio</div>
            <div class="precio-display"><span>$</span>39.99</div>
            <a href="pago.html" class="btn-reserva">RESERVAR MI LUGAR</a>
        </div>
    </section>

    <!-- UBICACIÓN CORREGIDA SIN MAPA QUE DA ERROR -->
    <section id="ubicacion">
        <h2 style="margin-bottom: 20px; color: var(--rosa);">NUESTRA SEDE</h2>
        <div class="contact-details">
            <p>📍 1020 S Olympia Pl, Kennewick, WA 99337</p>
            <p>📞 <b>WhatsApp:</b> 509-845-4218 / 509-845-4230</p>
            <p>📧 <b>Email:</b> MyTeamNfit@gmail.com</p>
            
            <!-- BOTÓN QUE ABRE GOOGLE MAPS REAL -->
            <a href="https://google.com" target="_blank" class="btn-mapa">
                VER RUTA EN GOOGLE MAPS 🗺️
            </a>
        </div>
    </section>

    <footer style="text-align: center;">
        &copy; 2024 TEAM-N-FIT | Kennewick, Washington.
    </footer>

</body>
</html>
