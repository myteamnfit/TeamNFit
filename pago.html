<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pago | Team-N-Fit</title>
    <style>
        :root {
            --rosa: #ff00ff;
            --blanco: #ffffff;
            --negro: #000000;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 25px;
            background: #050505;
            box-shadow: 0 15px 50px rgba(255, 0, 255, 0.1);
        }

        h1 { font-size: 1.3rem; font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; }
        .fecha { color: #666; font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 2px; }
        
        .monto { font-size: 4.5rem; font-weight: bold; margin: 15px 0; color: var(--blanco); }
        .monto span { font-size: 1.5rem; vertical-align: top; color: var(--rosa); margin-right: 5px; }

        .metodo-pago {
            margin-top: 30px;
            padding: 25px;
            border-radius: 20px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        /* Estilo para los LOGOS */
        .logo-pago {
            height: 30px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* CUADRO PAYPAL VISTOSO */
        .paypal-box {
            border: 1px solid #0070ba;
            padding: 20px;
            border-radius: 12px;
            background: rgba(0, 112, 186, 0.05);
            margin-top: 10px;
        }
        .email-pp { font-size: 0.95rem; color: #fff; font-weight: bold; display: block; margin-bottom: 15px; }

        .btn-paypal {
            background: #0070ba;
            color: white;
            padding: 16px;
            display: block;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        /* CUADRO ZELLE VISTOSO */
        .zelle-box {
            border: 1px solid #6d1ed4; /* Color oficial Zelle */
            padding: 20px;
            border-radius: 12px;
            background: rgba(109, 30, 212, 0.05);
            margin-top: 10px;
        }
        .num-zelle { color: #fff; font-size: 1.3rem; font-weight: bold; display: block; margin-bottom: 5px; }

        .btn-whatsapp {
            background: #25d366;
            color: black;
            padding: 16px;
            display: block;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .volver {
            display: inline-block;
            margin-top: 40px;
            color: #444;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RESERVA TU LUGAR</h1>
        <div class="fecha">Sábado 20 de Junio</div>
        
        <div class="monto"><span>$</span>39.99</div>

        <!-- OPCIÓN ZELLE CON LOGO -->
        <div class="metodo-pago">
            <img src="https://wikimedia.org" alt="Zelle Logo" class="logo-pago" style="filter: brightness(0) invert(1);">
            <div class="zelle-box">
                <span class="num-zelle">+1 (509) 845-4218</span>
                <small style="color:#888; letter-spacing:1px;">TEAM-N-FIT</small>
            </div>
            <!-- Enlace directo de WhatsApp sin mensaje automático para evitar errores -->
            <a href="https://wa.me" class="btn-whatsapp">ENVIAR COMPROBANTE</a>
        </div>

        <!-- OPCIÓN PAYPAL CON LOGO -->
        <div class="metodo-pago">
            <img src="https://wikimedia.org" alt="PayPal Logo" class="logo-pago">
            <div class="paypal-box">
                <span class="email-pp">padillaliranairubi@gmail.com</span>
                <a href="https://paypal.com" target="_blank" class="btn-paypal">PAGAR AHORA</a>
            </div>
        </div>

        <a href="index.html" class="volver">← Cancelar y volver al inicio</a>
    </div>

</body>
</html>
