<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pago | Team-N-Fit</title>
    <style>
        :root {
            --rosa: #ff00ff;
            --blanco: #ffffff;
            --negro: #000000;
            --azul-paypal: #0070ba;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 20px;
            background: #050505;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.4rem; font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; }
        .fecha { color: #666; font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 2px; }
        
        .monto { font-size: 4.5rem; font-weight: bold; margin: 20px 0; color: var(--blanco); }
        .monto span { font-size: 1.5rem; vertical-align: top; color: var(--rosa); margin-right: 5px; }

        .metodo-pago {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
        }

        .etiqueta { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; margin-bottom: 15px; }

        /* SECCIÓN PAYPAL VISTOSA */
        .paypal-card {
            border: 1px solid var(--azul-paypal);
            background: rgba(0, 112, 186, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .paypal-email {
            display: block;
            font-size: 1rem;
            color: var(--blanco);
            margin-bottom: 15px;
            word-break: break-all;
            font-weight: bold;
        }
        .btn-paypal {
            background: var(--azul-paypal);
            color: white;
            padding: 18px;
            display: block;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        /* SECCIÓN ZELLE VISTOSA */
        .zelle-card {
            border: 1px solid var(--rosa);
            background: rgba(255, 0, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .zelle-num { color: var(--rosa); font-size: 1.4rem; font-weight: bold; display: block; margin-bottom: 10px; }

        .btn-whatsapp {
            background: #25d366;
            color: black;
            padding: 15px;
            display: block;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .volver {
            display: inline-block;
            margin-top: 40px;
            color: #444;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Reserva Premium</h1>
        <div class="fecha">Sábado 20 de Junio</div>
        
        <div class="monto"><span>$</span>39.99</div>

        <!-- ZELLE -->
        <div class="metodo-pago">
            <div class="etiqueta">Opción 1: Zelle</div>
            <div class="zelle-card">
                <span class="zelle-num">+1 (509) 845-4218</span>
                <small style="color:#888">A nombre de: Team-N-Fit</small>
            </div>
            <a href="https://whatsapp.com." class="btn-whatsapp">Confirmar por WhatsApp</a>
        </div>

        <!-- PAYPAL -->
        <div class="metodo-pago">
            <div class="etiqueta">Opción 2: PayPal</div>
            <div class="paypal-card">
                <span class="paypal-email">padillaliranairubi@gmail.com</span>
                <a href="https://paypal.com" target="_blank" class="btn-paypal">Pagar con PayPal</a>
            </div>
        </div>

        <a href="index.html" class="volver">← Cancelar y volver</a>
    </div>

</body>
</html>

</body>
</html>
