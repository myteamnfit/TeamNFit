<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pago | Team-N-Fit</title>
    <style>
        :root {
            --rosa: #ff00ff;
            --blanco: #ffffff;
            --negro: #000000;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 15px;
            background: #050505;
        }

        h1 { font-size: 1.4rem; font-weight: 200; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; }
        .fecha { color: #888; font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 1px; }
        
        .monto { font-size: 4.5rem; font-weight: bold; margin: 20px 0; color: var(--blanco); }
        .monto span { font-size: 1.5rem; vertical-align: top; color: var(--rosa); margin-right: 5px; }

        .metodo-pago {
            margin-top: 25px;
            padding: 25px;
            border-radius: 10px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
        }

        /* Botón PayPal */
        .btn-paypal {
            background: #0070ba;
            color: white;
            padding: 18px;
            display: block;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* Sección Zelle */
        .zelle-info {
            border: 1px dashed var(--rosa);
            padding: 20px;
            border-radius: 5px;
            margin-top: 10px;
            line-height: 1.6;
        }
        .zelle-info b { color: var(--rosa); font-size: 1.3rem; letter-spacing: 1px; }

        .btn-whatsapp {
            background: #25d366;
            color: black;
            padding: 15px;
            display: block;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .volver {
            display: inline-block;
            margin-top: 40px;
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RESERVA PREMIUM</h1>
        <div class="fecha">Sábado 20 de Junio</div>
        
        <div class="monto"><span>$</span>39.99</div>

        <!-- OPCIÓN ZELLE -->
        <div class="metodo-pago">
            <p style="font-size: 0.75rem; margin-bottom: 15px; letter-spacing: 1px; opacity: 0.7;">PAGAR POR ZELLE</p>
            <div class="zelle-info">
                Envía tu pago al número:<br>
                <b>509-845-4218</b>
            </div>
            <!-- Botón para enviar comprobante -->
            <a href="https://wa.me." class="btn-whatsapp">Enviar comprobante por WhatsApp</a>
        </div>

        <!-- OPCIÓN PAYPAL -->
        <div class="metodo-pago">
            <p style="font-size: 0.75rem; margin-bottom: 15px; letter-spacing: 1px; opacity: 0.7;">O PAGA CON TARJETA / PAYPAL</p>
            <a href="https://paypal.com" target="_blank" class="btn-paypal">Pagar con PayPal</a>
        </div>

        <a href="index.html" class="volver">← Volver al inicio</a>
    </div>

</body>
</html>
